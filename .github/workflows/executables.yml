name: Executables

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
    - master
    tags-ignore:
    - "*"

env:
  DATE_FORMAT: "%Y.%m.%d"
  NUITKA_VERSION: "4.0.6"

permissions:
  contents: read

jobs:
  build:

    if: github.repository == 'Donovoi/gallery-dl'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: windows-latest
          architecture: x64
          python-version: "3.14"
          python-packages: ""
        - os: windows-2022
          architecture: x86
          python-version: "3.8"
          python-packages: "toml"
        - os: ubuntu-latest
          architecture: x64
          python-version: "3.13"
          python-packages: "secretstorage"
        - os: ubuntu-24.04-arm
          architecture: arm64
          python-version: "3.13"
          python-packages: "secretstorage"
        - os: macos-13
          architecture: x64
          python-version: "3.14"
          python-packages: ""
        - os: macos-14
          architecture: arm64
          python-version: "3.14"
          python-packages: ""

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }} ${{ matrix.architecture }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}

    - name: Environment Variables
      run: |
        echo "DATE=$(date '+${{ env.DATE_FORMAT }}')" >> "$GITHUB_ENV"
        echo "LABEL=$(python ./scripts/pyinstaller.py --print --os '${{ matrix.os }}' --arch '${{ matrix.architecture }}')" >> "$GITHUB_ENV"

    - name: Update Version
      # use Python since its behavior is consistent across operating systems
      shell: python
      run: |
        import re
        path = "./gallery_dl/version.py"
        with open(path) as fp:
            content = fp.read()
        content = re.sub(
            r'\b(__version__ = "[^"]+)',
            r"\1:${{ env.DATE }}",
            content)
        content = re.sub(
            r'\b(__variant__ =).+',
            r'\1 "dev/${{ env.LABEL }}"',
            content)
        with open(path, "w") as fp:
            fp.write(content)

    - name: Build executable
      run: |
        pip install requests requests[socks] yt-dlp[default] pyyaml ${{ matrix.python-packages }} nuitka==${{ env.NUITKA_VERSION }}
        pip install truststore || true
        python ./scripts/pyinstaller.py --label '${{ env.LABEL }}'

    - uses: actions/upload-artifact@v4
      with:
        name: executable-${{ env.LABEL }}
        path: dist/*
        retention-days: 1
        compression-level: 0

  package:

    if: github.repository == 'Donovoi/gallery-dl'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Build Python packages
      run: |
        python -m pip install build
        python -m build

    - name: Validate mobile package artifacts
      run: |
        python - <<'PY'
        from email.parser import Parser
        import glob
        import os
        import zipfile

        sdists = glob.glob("dist/*.tar.gz")
        if len(sdists) != 1:
            raise SystemExit("expected exactly one source archive in dist/")

        wheels = glob.glob("dist/*.whl")
        if len(wheels) != 1:
            raise SystemExit("expected exactly one wheel in dist/")

        wheel = wheels[0]
        if not wheel.endswith("-py3-none-any.whl"):
            raise SystemExit(
                "expected a universal py3-none-any wheel for mobile Python"
            )

        with zipfile.ZipFile(wheel) as zf:
            wheel_info = next(
                (
                    name for name in zf.namelist()
                    if name.endswith(".dist-info/WHEEL")
                ),
                None,
            )
            if wheel_info is None:
                raise SystemExit("expected wheel metadata in .dist-info/WHEEL")
            metadata = Parser().parsestr(zf.read(wheel_info).decode())

        if metadata.get("Root-Is-Purelib") != "true":
            raise SystemExit("expected a pure-Python wheel")
        if "py3-none-any" not in metadata.get_all("Tag", []):
            raise SystemExit("expected a py3-none-any wheel tag")

        print(
            "validated mobile package artifacts",
            os.path.basename(wheel),
            os.path.basename(sdists[0]),
        )
        PY

    - uses: actions/upload-artifact@v4
      with:
        name: python-package-mobile
        path: dist/*
        retention-days: 1
        compression-level: 0

  release:

    if: github.repository == 'Donovoi/gallery-dl'
    needs:
    - build
    - package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4

    - name: Environment Variables
      run: |
        DATE=$(date '+${{ env.DATE_FORMAT }}')
        SHORT_SHA=${GITHUB_SHA::7}

        echo "DATE=${DATE}" >> "$GITHUB_ENV"
        echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "RELEASE_TAG=nightly-${DATE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=nightly build ${DATE} (${SHORT_SHA})" >> "$GITHUB_ENV"
        else
          echo "RELEASE_TAG=master-${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=master build ${DATE} (${SHORT_SHA})" >> "$GITHUB_ENV"
        fi

    - name: Body
      run: |
        cat > body.md <<EOF
        Automated release for commit [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

        Included assets:
        - Nuitka standalone builds for Windows, Linux, and macOS across x64, x86, and arm64 runners.
        - Universal Python wheel and source archive for Python-based 64-bit ARM mobile environments such as Samsung Galaxy and Google Pixel devices.
        EOF

    - uses: ncipollo/release-action@v1
      with:
        tag: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_NAME }}
        bodyFile: body.md
        artifacts: "executable-*/*,python-package-mobile/*"
        allowUpdates: true
        replacesArtifacts: true
        prerelease: true
        token: ${{ github.token }}
