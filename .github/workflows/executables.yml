name: Executables

on:
  workflow_dispatch:
  push:
    branches:
    - master
    tags-ignore:
    - "*"

env:
  DATE_FORMAT: "%Y.%m.%d"
  RELEASE_TAG: master-${{ github.sha }}

permissions:
  contents: write

jobs:
  build:

    if: github.repository == 'Donovoi/gallery-dl'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: windows-latest
          architecture: x64
          python-version: "3.14"
          python-packages: ""
        - os: windows-2022
          architecture: x86
          python-version: "3.8"
          python-packages: "toml"
        - os: ubuntu-latest
          architecture: x64
          python-version: "3.13"
          python-packages: "secretstorage"
        - os: ubuntu-24.04-arm
          architecture: arm64
          python-version: "3.13"
          python-packages: "secretstorage"
        - os: macos-13
          architecture: x64
          python-version: "3.14"
          python-packages: ""
        - os: macos-14
          architecture: arm64
          python-version: "3.14"
          python-packages: ""

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }} ${{ matrix.architecture }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}

    - name: Environment Variables
      run: |
        echo "DATE=$(date '+${{ env.DATE_FORMAT }}')" >> "$GITHUB_ENV"
        echo "LABEL=$(python ./scripts/pyinstaller.py --print --os '${{ matrix.os }}' --arch '${{ matrix.architecture }}')" >> "$GITHUB_ENV"

    - name: Update Version
      # use Python since its behavior is consistent across operating systems
      shell: python
      run: |
        import re
        path = "./gallery_dl/version.py"
        with open(path) as fp:
            content = fp.read()
        content = re.sub(
            r'\b(__version__ = "[^"]+)',
            r"\1:${{ env.DATE }}",
            content)
        content = re.sub(
            r'\b(__variant__ =).+',
            r'\1 "dev/${{ env.LABEL }}"',
            content)
        with open(path, "w") as fp:
            fp.write(content)

    - name: Build executable
      run: |
        pip install requests requests[socks] yt-dlp[default] pyyaml ${{ matrix.python-packages }} nuitka
        pip install truststore || true
        python ./scripts/pyinstaller.py --label '${{ env.LABEL }}'

    - uses: actions/upload-artifact@v4
      with:
        name: executable-${{ env.LABEL }}
        path: dist/*
        retention-days: 1
        compression-level: 0

  package:

    if: github.repository == 'Donovoi/gallery-dl'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Build Python packages for iOS and Android
      run: |
        python -m pip install build
        python -m build

    - uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/*
        retention-days: 1
        compression-level: 0

  release:

    if: github.repository == 'Donovoi/gallery-dl'
    needs:
    - build
    - package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4

    - name: Environment Variables
      run: |
        echo "DATE=$(date '+${{ env.DATE_FORMAT }}')" >> "$GITHUB_ENV"
        echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

    - name: Body
      run: |
        cat > body.md <<EOF
        Automated release for commit [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

        Included assets:
        - Nuitka standalone builds for Windows, Linux, and macOS across x64, x86, and arm64 runners.
        - Python wheel and source distributions for Python-based iOS and Android environments.
        EOF

    - uses: ncipollo/release-action@v1
      with:
        tag: ${{ env.RELEASE_TAG }}
        name: master build ${{ env.DATE }} (${{ env.SHORT_SHA }})
        bodyFile: body.md
        artifacts: "executable-*/*,python-package/*"
        allowUpdates: true
        makeLatest: true
        prerelease: true
        token: ${{ github.token }}
