name: Sync Fork

on:
  workflow_dispatch:
  repository_dispatch:
    types:
    - upstream_master_push
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-fork
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'Donovoi/gallery-dl'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        ref: master
        fetch-depth: 0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Merge upstream/master
      run: |
        git remote add upstream https://github.com/mikf/gallery-dl.git
        git fetch upstream master

        if git merge-base --is-ancestor upstream/master HEAD; then
          echo "Fork is already up to date with upstream/master"
          exit 0
        fi

        if git merge --ff-only upstream/master; then
          echo "Fast-forwarded master to upstream/master"
        else
          if git merge -X theirs --no-commit upstream/master; then
            CONFLICTS=""
          else
            MERGE_STATUS=$?
            CONFLICTS="$(git diff --name-only --diff-filter=U)"
            if [ -z "$CONFLICTS" ]; then
              echo "::error::Automatic merge with upstream/master failed"
              exit "$MERGE_STATUS"
            fi
          fi

          if [ -n "$CONFLICTS" ]; then
            printf 'Resolving remaining merge conflicts in favor of upstream/master:\n%s\n' "$CONFLICTS"
            while IFS= read -r path; do
              if [ -n "$path" ]; then
                if git show ":3:$path" >/dev/null 2>&1; then
                  git checkout --theirs -- "$path"
                else
                  git rm -f -- "$path"
                fi
              fi
            done <<< "$CONFLICTS"
          fi

          git add -A
          git commit --no-edit
          echo "Merged upstream/master into fork master"
        fi

        git push origin HEAD:master
